services:
  postgres:
    image: postgres:16-alpine
    container_name: wagi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wagi
      POSTGRES_USER: wagi
      POSTGRES_PASSWORD: wagi123
    ports:
      - "5433:5432"
    volumes:
      - wagi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wagi -d wagi"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  wagi_postgres_data:
